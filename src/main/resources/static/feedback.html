<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Feedback</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/feedback.css">
</head>
<body>

    <div class="feedback-card">
        <h2 class="serif-title">We value your feedback!</h2>
        <p style="color: #666; margin-bottom: 30px;">Let us know how we can improve this survey experience.</p>

        <div class="form-group">
            <label class="block-label">Name (Optional):</label>
            <input type="text" id="feedbackName" name="respondentName" class="full-width-input" placeholder="Anonymous">
        </div>

        <div class="form-group">
            <label class="block-label">Your Comments:</label>
            <textarea id="feedbackText" name="comment" class="full-width-input" rows="5" placeholder="Type your feedback here..."></textarea>
        </div>

        <div class="button-group" style="margin-top: 20px;">
            <button class="action-btn-outline" onclick="window.location.href='index.html'">Cancel</button>
            <button class="action-btn" id="btn-submit-feedback">Submit Feedback</button>
        </div>
    </div>

    <script type="module" src="js/services/feedbackService.js"></script>

</body>
</html>
